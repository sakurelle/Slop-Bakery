<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "ИС хлебозавода" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ request.url_for('static', path='style.css') }}">
</head>
<body class="bakery-body">
    {% if current_user %}
    <nav class="navbar navbar-expand-lg navbar-dark bakery-navbar sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-semibold" href="/">ИС хлебозавода</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 flex-wrap">
                    {% for item in nav_items %}
                    <li class="nav-item">
                        <a class="nav-link {% if request.url.path == item.path %}active{% endif %}" href="{{ item.path }}">{{ item.label }}</a>
                    </li>
                    {% endfor %}
                </ul>
                <div class="d-flex align-items-center gap-3 small">
                    <span><strong>{{ current_user.full_name }}</strong> ({{ primary_role_label or 'Без роли' }})</span>
                    <a class="btn btn-sm btn-outline-light" href="/logout">Выход</a>
                </div>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="container py-4">
        {% if flash %}
        <div class="alert alert-{{ flash.category }} shadow-sm">{{ flash.message }}</div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
