<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ request.url_for('static', path='style.css') }}">
</head>
<body class="login-page">
    <div class="login-card shadow-lg">
        <div class="login-card__header">
            <h1 class="h3 mb-1">ИС хлебозавода</h1>
            <p class="mb-0 text-secondary">Войдите, чтобы открыть локальный интерфейс курсовой работы.</p>
        </div>
        {% if error_message %}
        <div class="alert alert-danger mt-3">{{ error_message }}</div>
        {% endif %}
        <form action="/login" method="post" class="mt-4">
            <div class="mb-3">
                <label class="form-label">Логин</label>
                <input type="text" name="username" class="form-control" value="{{ form_data.username if form_data else '' }}" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-bakery w-100">Войти</button>
        </form>
        <div class="small text-secondary mt-4">
            Локальный демонстрационный интерфейс для курсовой работы по PostgreSQL.
        </div>
    </div>
</body>
</html>
